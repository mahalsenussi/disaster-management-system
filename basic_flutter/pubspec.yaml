name: disaster_management_app
description: Libya Disaster Management Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP requests
  http: ^1.1.0
  
  # Location services
  geolocator: ^14.0.2
  
  # Maps
  flutter_map: ^8.3.0
  latlong2: ^0.9.0
  
  # QR code
  qr_flutter: ^4.1.0
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # State management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^17.2.2
  
  # UI components
  cupertino_icons: ^1.0.2
  
  # Permissions
  permission_handler: ^12.0.1

  # Device info
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
