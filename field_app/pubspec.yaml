name: field_app
description: Emergency field operations app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # HTTP
  http: ^1.1.0
  
  # State
  provider: ^6.1.0
  
  # Storage
  shared_preferences: ^2.2.0
  
  # Location
  geolocator: ^10.1.0
  
  # QR Scanner
  mobile_scanner: ^4.0.0
  
  # Permissions
  permission_handler: ^11.0.0
  
  # Utils
  intl: ^0.18.0
  
  # Screen wake lock
  wakelock_plus: ^1.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
